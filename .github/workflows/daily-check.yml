# Run the LeetCode daily check on a schedule and notify via Telegram.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   LEETCODE_SESSION
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#
# Optional:
#   LEETCODE_CSRFTOKEN
#
# Four runs only. Cron is UTC; times below match Europe/Zurich in winter (CET,
# UTC+1). In summer (CEST, UTC+2) they fire one hour later local time.
#
# Scheduled runs use --skip-if-done so completed dailies stay quiet.
# Manual workflow_dispatch can always notify (skip_if_done input, default false).

name: Daily LeetCode check

on:
  schedule:
    # Europe/Zurich wall times under CET (UTC+1)
    - cron: "0 9 * * *" # 10:00 Zurich — quiet if open
    - cron: "0 13 * * *" # 14:00 Zurich — quiet if open
    - cron: "0 17 * * *" # 18:00 Zurich — quiet if open
    - cron: "0 22 * * *" # 23:00 Zurich — alert if open
  workflow_dispatch:
    inputs:
      notify:
        description: "Send Telegram notification"
        type: boolean
        default: true
      silent:
        description: "Quiet Telegram delivery (disable_notification)"
        type: boolean
        default: false
      skip_if_done:
        description: "Skip Telegram when the daily is already solved"
        type: boolean
        default: false

concurrency:
  group: daily-leetcode-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: Check daily challenge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        # Pin a release tag (floating @v8 does not resolve). Node 24 runtime.
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync project
        run: uv sync

      - name: Decide notify flags
        id: flags
        shell: bash
        env:
          TZ: Europe/Zurich
        run: |
          set -euo pipefail

          echo "Runner local (Europe/Zurich): $(date '+%Y-%m-%d %H:%M %Z')"

          NOTIFY="true"
          SILENT="true"
          SKIP_IF_DONE="true"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTIFY="${{ inputs.notify }}"
            SILENT="${{ inputs.silent }}"
            SKIP_IF_DONE="${{ inputs.skip_if_done }}"
          else
            # Night slot (23:00 Zurich / 22:00 UTC under CET): sound if open
            case "${{ github.event.schedule }}" in
              "0 22 * * *")
                SILENT="false"
                ;;
              *)
                SILENT="true"
                ;;
            esac
            NOTIFY="true"
            SKIP_IF_DONE="true"
          fi

          ARGS=()
          if [ "$NOTIFY" = "true" ]; then
            ARGS+=(--notify)
            if [ "$SILENT" = "true" ]; then
              ARGS+=(--silent)
            fi
            if [ "$SKIP_IF_DONE" = "true" ]; then
              ARGS+=(--skip-if-done)
            fi
          fi

          echo "args=${ARGS[*]-}" >> "$GITHUB_OUTPUT"
          echo "Resolved flags: ${ARGS[*]-}"

      - name: Run check_daily.py
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Exit codes: 0 done, 1 not done, 2 error, 3 not signed in.
        # Fail the job only on hard errors (2).
        run: |
          set +e
          # shellcheck disable=SC2086
          uv run check_daily.py ${{ steps.flags.outputs.args }}
          code=$?
          set -e
          echo "Exit code: $code"
          if [ "$code" -eq 2 ]; then
            exit 2
          fi
          exit 0
