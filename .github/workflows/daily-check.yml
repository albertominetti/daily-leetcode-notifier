# Run the LeetCode daily check on a schedule and notify via Telegram.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   LEETCODE_SESSION
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#
# Optional:
#   LEETCODE_CSRFTOKEN
#
# Target local times: Europe/Zurich at 10:00, 14:00, 18:00 (silent) and 23:00 (alert).
# GitHub Actions cron only supports UTC, so we schedule every UTC hour that can map
# to those Zurich times under CET (UTC+1) or CEST (UTC+2), then filter by local hour.

name: Daily LeetCode check

on:
  schedule:
    # UTC times that can be 10/14/18/23 in Europe/Zurich (CET or CEST)
    # CET  (UTC+1): 09, 13, 17, 22 UTC
    # CEST (UTC+2): 08, 12, 16, 21 UTC
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      silent:
        description: "Use silent Telegram delivery (disable_notification)"
        type: boolean
        default: true
      notify:
        description: "Send Telegram notification"
        type: boolean
        default: true

concurrency:
  group: daily-leetcode-check
  cancel-in-progress: false

permissions:
  contents: read

env:
  TZ: Europe/Zurich

jobs:
  check:
    name: Check daily challenge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve Europe/Zurich schedule slot
        id: slot
        shell: bash
        run: |
          set -euo pipefail

          # Ensure zoneinfo is available for TZ=Europe/Zurich
          export TZ=Europe/Zurich
          NOW="$(date '+%Y-%m-%d %H:%M %Z')"
          HOUR="$(date '+%H')"
          echo "Local time (Europe/Zurich): $NOW (hour=$HOUR)"

          SHOULD_RUN="false"
          NOTIFY="true"
          SILENT="true"
          REASON=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN="true"
            NOTIFY="${{ inputs.notify }}"
            SILENT="${{ inputs.silent }}"
            REASON="manual workflow_dispatch"
          else
            case "$HOUR" in
              10|14|18)
                SHOULD_RUN="true"
                NOTIFY="true"
                SILENT="true"
                REASON="Zurich ${HOUR}:00 quiet status"
                ;;
              23)
                SHOULD_RUN="true"
                NOTIFY="true"
                SILENT="false"
                REASON="Zurich 23:00 alert if incomplete"
                ;;
              *)
                SHOULD_RUN="false"
                REASON="Zurich hour ${HOUR} is not a schedule slot (off-DST UTC fire) — skip"
                ;;
            esac
          fi

          ARGS=()
          if [ "$NOTIFY" = "true" ]; then
            ARGS+=(--notify)
            if [ "$SILENT" = "true" ]; then
              ARGS+=(--silent)
            fi
          fi

          {
            echo "should_run=$SHOULD_RUN"
            echo "reason=$REASON"
            echo "args=${ARGS[*]-}"
          } >> "$GITHUB_OUTPUT"

          echo "should_run=$SHOULD_RUN reason=$REASON flags=${ARGS[*]-}"

      - name: Checkout
        if: steps.slot.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Install uv
        if: steps.slot.outputs.should_run == 'true'
        # Pin a release tag (floating @v8 does not resolve). Node 24 runtime.
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.slot.outputs.should_run == 'true'
        run: uv python install

      - name: Sync project
        if: steps.slot.outputs.should_run == 'true'
        run: uv sync

      - name: Run check_daily.py
        if: steps.slot.outputs.should_run == 'true'
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Exit codes: 0 done, 1 not done, 2 error, 3 not signed in.
        # Do not fail the workflow for "not done" (1) or "not signed in" (3);
        # those are expected outcomes (Telegram already notified).
        # Fail the job only on hard errors (2).
        run: |
          set +e
          # shellcheck disable=SC2086
          uv run check_daily.py ${{ steps.slot.outputs.args }}
          code=$?
          set -e
          echo "Exit code: $code (${{ steps.slot.outputs.reason }})"
          if [ "$code" -eq 2 ]; then
            exit 2
          fi
          exit 0

      - name: Skipped (not a Zurich target hour)
        if: steps.slot.outputs.should_run != 'true'
        run: echo "Skipped — ${{ steps.slot.outputs.reason }}"
